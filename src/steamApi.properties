url=jdbc:mysql://localhost:3306/steam_games?serverTimezone=Asia/Shanghai
checkUrl=jdbc:mysql://localhost:3306/?serverTimezone=Asia/Shanghai
user=root
password=
driver=com.mysql.cj.jdbc.Driver
insertNewGame=INSERT INTO games (app_id, name, developer, publisher, price, release_date, positive_reviews, negative_reviews, total_reviews, review_score_desc, type) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?) ON DUPLICATE KEY UPDATE name=VALUES(name), developer=VALUES(developer), publisher=VALUES(publisher), price=VALUES(price), release_date=VALUES(release_date), positive_reviews=VALUES(positive_reviews), negative_reviews=VALUES(negative_reviews), total_reviews=VALUES(total_reviews), review_score_desc=VALUES(review_score_desc), type=VALUES(type)
insertNewTag=INSERT INTO tags (tag_name) VALUES (?)
insertNewGame_Tag=INSERT IGNORE INTO games_tags (app_id, tag_id) VALUES (?, (SELECT tag_id FROM tags WHERE tag_name = ?))
selectTagId=SELECT tag_id FROM tags WHERE tag_name = ?
insertNotInCHINA=insert into not_in_china (app_id) VALUES(?);
selectGamesDesc=select app_Id,review_score_desc FROM games;
updateGamesDesc=update games SET review_score_desc=? WHERE app_Id=?
SELECTBYMONTH=SELECT * FROM v_game_summary WHERE MONTH(release_date_parsed)=? LIMIT ?,10;
getTotalGame=SELECT COUNT(1) AS count FROM v_game_summary
getTotalGameByMonth=SELECT COUNT(1) AS count FROM v_game_summary WHERE MONTH(release_date_parsed)=?
getGameByFree=SELECT * FROM v_game_summary WHERE price=0;
getGameByPositive=SELECT * FROM v_game_summary WHERE total_reviews >=100 AND type='game' ORDER BY positive_rate_percent DESC LIMIT 10
parsedDateTime=UPDATE games SET release_date_parsed = STR_TO_DATE(REPLACE(release_date, ' ', ''), '%Y\u5e74%m\u6708%d\u65e5') WHERE release_date LIKE '%\u5e74%\u6708%\u65e5%'
isInit=SELECT COUNT(*) AS is_init FROM information_schema.tables WHERE table_schema = 'steam_games' AND table_name = 'games'
selectGameByAppId=SELECT * FROM games WHERE app_id = ?
isGameExist=SELECT 1 FROM games WHERE app_id = ?


